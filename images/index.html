<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UniSecure Portal</title>

<!-- SECURITY META -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline';">
<meta name="referrer" content="no-referrer" />

<style>
:root{
  --primary:#38bdf8;
  --dark:#0f172a;
  --card:#1e293b;
  --text:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:var(--dark);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
 background-image: url("header.jpg");
background-position: center;
background-repeat: no-repeat;
background-size: cover;
height: 300px;
position: relative;
  position:sticky;
  top:0;
  z-index:1000;
}

nav a{
  margin:0 10px;
  color:white;
  text-decoration:none;
}

.btn{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary{background:var(--primary);}
.outline{border:1px solid var(--primary); background:transparent; color:white;}

.hero{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1') center/cover;
}

.section{
  padding:60px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:10px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  background:var(--primary);
}

/* LOGIN MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#111827;
  padding:25px;
  border-radius:10px;
  width:300px;
}

input{ 
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}
</style>
</head>
<body>

<header>
  <div><b>St.marks theological college</b></div>
  <nav>
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#Admission">Admission</a>
    <a href="#Community">Community</a>
    <a href="#Student">Student</a>
    <a href="#E-service">E-service </a>
    <a href="#Contact Us">Contact Us</a>
  </nav>
  <button class="btn primary" onclick="openLogin()">Login</button>
</header>

<section class="hero" id="home">
  <div>
    <h1>St.marks Theological College</h1>
    <p></p>
    <button class="btn primary">Get Started</button>
  </div>
</section>

<section class="section" id="services">
  <h2>Services</h2>
  <div class="grid">
    <div class="card"> Student Dashboard</div>
    <div class="card"> Course Management</div>
    <div class="card"> Lecturer Panel</div>
    <div class="card"> Results System</div>
    <div class="card"> Admin Control</div>
    <div class="card"> Secure Messaging</div>
  </div>
</section>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
  <div class="modal-box">
    <h3>Login System</h3>
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <select id="role">
      <option value="student">Student</option>
      <option value="lecturer">Lecturer</option>
      <option value="admin">Admin</option>
    </select>
    <button class="btn primary" onclick="login()">Login</button>
    <button class="btn outline" onclick="closeLogin()">Close</button>
  </div>
</div>

<script>
// SECURITY LAYER (FRONTEND ONLY)

function sanitize(input){
  return input.replace(/[<>]/g,""); // basic XSS protection
}

function openLogin(){
  document.getElementById("loginModal").style.display="flex";
}

function closeLogin(){
  document.getElementById("loginModal").style.display="none";
}

function login(){
  let user = sanitize(document.getElementById("username").value);
  let pass = sanitize(document.getElementById("password").value);
  let role = document.getElementById("role").value;

  if(user.length < 3 || pass.length < 3){
    alert("Invalid credentials format");
    return;
  }

  // MOCK TOKEN SYSTEM
  let token = btoa(user + ":" + role);
  localStorage.setItem("token", token);
  localStorage.setItem("role", role);

  alert("Login successful as " + role);
  closeLogin();

  routeUser(role);
}

function routeUser(role){
  if(role === "admin"){
    console.log("Redirect to Admin Dashboard");
  } else if(role === "lecturer"){
    console.log("Redirect to Lecturer Panel");
  } else {
    console.log("Redirect to Student Portal");
  }
}

// AUTO CHECK SESSION
window.onload = () => {
  let token = localStorage.getItem("token");
  if(token){
    console.log("User already logged in");
  }
};
</script>

</body>
</html>
